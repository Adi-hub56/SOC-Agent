
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: soc-agent-postgres
    environment:
      POSTGRES_DB: soc_agent
      POSTGRES_USER: soc_user
      POSTGRES_PASSWORD: soc_password_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: soc-agent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: soc-agent-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://soc_user:soc_password_dev@postgres:5432/soc_agent
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_key_12345
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soc-network

volumes:
  postgres_data:

networks:
  soc-network:
    driver: bridge

